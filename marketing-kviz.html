<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Kvíz</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #fff; color: #222; }
header { background: #1a73e8; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
header h1 { font-size: 20px; font-weight: 600; }
.badge { background: rgba(255,255,255,0.25); border-radius: 20px; padding: 3px 10px; font-size: 13px; }
nav { display: flex; border-bottom: 2px solid #e8eaed; background: #fff; }
nav button { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; font-size: 14px; font-weight: 500; color: #666; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .2s; }
nav button.active { color: #1a73e8; border-bottom-color: #1a73e8; }
nav button:hover { background: #f8f9fa; }
.page { display: none; padding: 24px; max-width: 860px; margin: 0 auto; }
.page.active { display: block; }

/* SETUP */
.setup-card { background: #f8f9fa; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.setup-card h3 { font-size: 15px; margin-bottom: 14px; color: #444; }
.btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
.btn-opt { padding: 8px 16px; border: 2px solid #dadce0; border-radius: 20px; background: #fff; cursor: pointer; font-size: 14px; transition: all .15s; }
.btn-opt:hover { border-color: #1a73e8; color: #1a73e8; }
.btn-opt.selected { border-color: #1a73e8; background: #e8f0fe; color: #1a73e8; font-weight: 600; }
.btn-primary { background: #1a73e8; color: #fff; border: none; border-radius: 8px; padding: 12px 28px; font-size: 15px; cursor: pointer; font-weight: 600; }
.btn-primary:hover { background: #1557b0; }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.source-label { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.src-m162 { background: #e8f0fe; color: #1a73e8; }
.src-p111 { background: #fce8e6; color: #c5221f; }

/* QUIZ */
#quiz-progress-bar { height: 6px; background: #e8eaed; border-radius: 3px; margin-bottom: 20px; }
#quiz-progress-fill { height: 100%; background: #1a73e8; border-radius: 3px; transition: width .3s; }
.quiz-meta { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-bottom: 8px; }
.question-card { background: #fff; border: 2px solid #e8eaed; border-radius: 12px; padding: 24px; }
.question-text { font-size: 16px; line-height: 1.5; margin-bottom: 20px; font-weight: 500; }
.options { display: flex; flex-direction: column; gap: 10px; }
.option-btn { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border: 2px solid #e8eaed; border-radius: 10px; background: #fff; cursor: pointer; text-align: left; font-size: 14px; line-height: 1.4; transition: all .15s; }
.option-btn:hover:not(:disabled) { border-color: #1a73e8; background: #f0f4ff; }
.option-btn .letter { font-weight: 700; color: #1a73e8; min-width: 20px; }
.option-btn.correct { border-color: #34a853; background: #e6f4ea; }
.option-btn.correct .letter { color: #34a853; }
.option-btn.wrong { border-color: #ea4335; background: #fce8e6; }
.option-btn.wrong .letter { color: #ea4335; }
.option-btn:disabled { cursor: default; }
.feedback { margin-top: 16px; padding: 12px 16px; border-radius: 8px; font-size: 14px; }
.feedback.correct-fb { background: #e6f4ea; color: #1e7e34; }
.feedback.wrong-fb { background: #fce8e6; color: #c5221f; }
.explanation { margin-top: 8px; font-size: 13px; color: #555; font-style: italic; }
.quiz-actions { margin-top: 20px; display: flex; gap: 12px; }
.btn-secondary { background: #f8f9fa; color: #444; border: 2px solid #dadce0; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; font-weight: 500; }
.btn-secondary:hover { background: #e8eaed; }
#wrong-counter { background: #fce8e6; color: #c5221f; border-radius: 20px; padding: 4px 12px; font-size: 13px; font-weight: 600; }

/* RESULTS */
.results-card { background: #f8f9fa; border-radius: 12px; padding: 32px; text-align: center; }
.results-score { font-size: 48px; font-weight: 700; color: #1a73e8; }
.results-label { font-size: 16px; color: #666; margin-top: 4px; }
.results-stats { display: flex; justify-content: center; gap: 32px; margin: 24px 0; }
.stat { text-align: center; }
.stat-num { font-size: 28px; font-weight: 700; }
.stat-num.green { color: #34a853; }
.stat-num.red { color: #ea4335; }
.stat-label { font-size: 13px; color: #666; }

/* BROWSE */
.search-bar { display: flex; gap: 8px; margin-bottom: 20px; }
.search-bar input { flex: 1; padding: 10px 14px; border: 2px solid #dadce0; border-radius: 8px; font-size: 14px; outline: none; }
.search-bar input:focus { border-color: #1a73e8; }
.filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; font-size: 13px; color: #666; }
.q-count { color: #888; font-size: 13px; margin-bottom: 12px; }
.browse-item { border: 1px solid #e8eaed; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: all .15s; }
.browse-item:hover { border-color: #1a73e8; background: #f8f9fa; }
.browse-item .q-num { font-size: 12px; color: #888; margin-bottom: 4px; }
.browse-item .q-text { font-size: 14px; font-weight: 500; }
.browse-item .q-correct { font-size: 13px; color: #34a853; margin-top: 4px; }

/* WRONG ANSWERS PAGE */
.wrong-section { margin-bottom: 32px; }
.wrong-section h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.wrong-section h3 span { background: #ea4335; color: #fff; border-radius: 50%; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; }
.wrong-item { border: 1px solid #f5c6cb; background: #fff5f5; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; font-size: 14px; }
.wrong-item .wq-text { font-weight: 500; margin-bottom: 4px; }
.wrong-item .wq-answer { color: #c5221f; font-size: 13px; }
.wrong-item .wq-correct { color: #34a853; font-size: 13px; }
.empty-state { text-align: center; padding: 48px; color: #aaa; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

/* Multi-select */
.multi-hint { font-size: 12px; color: #888; margin-bottom: 8px; font-style: italic; }

/* Range selector */
.range-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
</style>
</head>
<body>

<header>
  <h1>📚 Marketing Kvíz</h1>
  <span class="badge" id="total-badge">273 otázek</span>
  <span class="badge" id="wrong-counter-header" style="background:rgba(234,67,53,0.3);display:none">❌ <span id="wrong-count-h">0</span> špatně</span>
</header>

<nav>
  <button class="active" onclick="showPage('setup')">🎯 Nový kvíz</button>
  <button onclick="showPage('quiz')" id="nav-quiz" style="display:none">📝 Kvíz</button>
  <button onclick="showPage('browse')">📖 Přehled otázek</button>
  <button onclick="showPage('wrong')">❌ Špatné odpovědi</button>
</nav>

<div class="page active" id="page-setup">
  <div class="setup-card">
    <h3>📂 Zdroj otázek</h3>
    <div class="btn-group" id="source-group">
      <button class="btn-opt selected" data-value="all" onclick="selectOpt('source',this)">Vše (273)</button>
      <button class="btn-opt" data-value="m162" onclick="selectOpt('source',this)">Marketing 162 <span class="source-label src-m162">162</span></button>
      <button class="btn-opt" data-value="p111" onclick="selectOpt('source',this)">Primát 111 <span class="source-label src-p111">111</span></button>
      <button class="btn-opt" data-value="wrong" onclick="selectOpt('source',this)">❌ Jen špatné odpovědi</button>
    </div>
  </div>
  
  <div class="setup-card">
    <h3>🔢 Počet otázek v dávce</h3>
    <div class="btn-group" id="batch-group">
      <button class="btn-opt selected" data-value="25" onclick="selectOpt('batch',this)">25</button>
      <button class="btn-opt" data-value="50" onclick="selectOpt('batch',this)">50</button>
      <button class="btn-opt" data-value="75" onclick="selectOpt('batch',this)">75</button>
      <button class="btn-opt" data-value="100" onclick="selectOpt('batch',this)">100</button>
      <button class="btn-opt" data-value="all" onclick="selectOpt('batch',this)">Všechny</button>
    </div>
  </div>
  
  <div class="setup-card">
    <h3>📋 Pořadí</h3>
    <div class="btn-group" id="order-group">
      <button class="btn-opt selected" data-value="sequential" onclick="selectOpt('order',this)">Postupně (1-25, 25-50...)</button>
      <button class="btn-opt" data-value="random" onclick="selectOpt('order',this)">Náhodně</button>
    </div>
  </div>

  <div class="setup-card" id="range-card">
    <h3>📑 Rozsah otázek <span id="range-info" style="font-weight:400;color:#888;font-size:13px"></span></h3>
    <div class="range-selector" id="range-buttons"></div>
  </div>

  <button class="btn-primary" id="start-btn" onclick="startQuiz()">▶ Spustit kvíz</button>
</div>

<div class="page" id="page-quiz">
  <div id="quiz-progress-bar"><div id="quiz-progress-fill" style="width:0%"></div></div>
  <div class="quiz-meta">
    <span id="quiz-qnum">Otázka 1 / 25</span>
    <span id="quiz-source-badge"></span>
    <span id="wrong-counter">❌ 0 k opakování</span>
  </div>
  <div class="question-card">
    <div class="question-text" id="quiz-question"></div>
    <div class="multi-hint" id="multi-hint" style="display:none">⚡ Více správných odpovědí – vyber všechny správné a potvrď</div>
    <div class="options" id="quiz-options"></div>
    <div class="feedback" id="quiz-feedback" style="display:none"></div>
    <div class="explanation" id="quiz-explanation" style="display:none"></div>
  </div>
  <div class="quiz-actions">
    <button class="btn-primary" id="btn-confirm" onclick="confirmMulti()" style="display:none">✓ Potvrdit</button>
    <button class="btn-primary" id="btn-next" onclick="nextQuestion()" style="display:none">Další →</button>
    <button class="btn-secondary" onclick="endQuiz()">⏹ Ukončit</button>
  </div>
</div>

<div class="page" id="page-results">
  <div class="results-card">
    <div class="results-score" id="res-score">0%</div>
    <div class="results-label">Výsledek kvízu</div>
    <div class="results-stats">
      <div class="stat"><div class="stat-num green" id="res-correct">0</div><div class="stat-label">Správně</div></div>
      <div class="stat"><div class="stat-num red" id="res-wrong">0</div><div class="stat-label">Špatně</div></div>
      <div class="stat"><div class="stat-num" id="res-total">0</div><div class="stat-label">Celkem</div></div>
    </div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn-primary" onclick="showPage('setup')">🔄 Nový kvíz</button>
      <button class="btn-secondary" onclick="retryWrong()" id="retry-wrong-btn">❌ Opakovat špatné</button>
      <button class="btn-secondary" onclick="showPage('wrong')">📋 Zobrazit špatné</button>
    </div>
  </div>
</div>

<div class="page" id="page-browse">
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="🔍 Hledat otázku nebo klíčové slovo..." oninput="filterBrowse()">
  </div>
  <div class="filter-row">
    Filtr:
    <button class="btn-opt selected" data-value="all" onclick="selectBrowseFilter(this,'all')" style="padding:4px 12px">Vše</button>
    <button class="btn-opt" data-value="m162" onclick="selectBrowseFilter(this,'m162')" style="padding:4px 12px">Marketing 162</button>
    <button class="btn-opt" data-value="p111" onclick="selectBrowseFilter(this,'p111')" style="padding:4px 12px">Primát 111</button>
  </div>
  <div class="q-count" id="browse-count"></div>
  <div id="browse-list"></div>
</div>

<div class="page" id="page-wrong">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <h2 style="font-size:18px">❌ Špatně zodpovězené otázky</h2>
    <button class="btn-secondary" onclick="clearWrong()" style="font-size:13px">🗑 Vymazat vše</button>
  </div>
  <div id="wrong-list"></div>
</div>

<script>
const QUESTIONS = [{"id": 1, "source": "Marketing 162", "text": "Mezi etapy cíleného marketingu NEPATŘÍ:", "options": {"A": "Tržní zacílení", "B": "Tržní umístění", "C": "Segmentace trhu", "D": "Brainstorming, astroturfing"}, "correct": ["D"], "explanation": ""}, {"id": 2, "source": "Marketing 162", "text": "Fáze cíleného marketingu NENÍ", "options": {"A": "situační analýza", "B": "tržní umístění", "C": "segmentace trhu", "D": "tržní zacílení"}, "correct": ["A"], "explanation": ""}, {"id": 3, "source": "Marketing 162", "text": "Způsob vnímání produktu zákazníky v porovnání s konkurenčními výrobky označujeme jako:", "options": {"A": "Tržní umístění", "B": "Psychografickou segmentaci", "C": "Brainstorming", "D": "Tržní zacílení"}, "correct": ["A"], "explanation": ""}, {"id": 4, "source": "Marketing 162", "text": "Frančíza patří mezi:", "options": {"A": "Diagonální marketingový systém", "B": "Horizontální marketingové systémy", "C": "Vertikální marketingové systémy", "D": "Progresivní marketingové systémy"}, "correct": ["C"], "explanation": ""}, {"id": 5, "source": "Marketing 162", "text": "Potřeby v Maslowově hierarchii potřeb jsou seřazeny od nejnižšího patra po nejvyšší jako:", "options": {"A": "Fyziologické potřeby, bezpečí, láska a přijetí, úcta, seberealizace", "B": "Fyziologické potřeby, seberealizace, bezpečí, láska a přijetí, úcta", "C": "Láska a přijetí, úcta, seberealizace, fyziologické potřeby, bezpečí", "D": "Bezpečí, fyziologické potřeby, láska a přijetí, úcta, seberealizace"}, "correct": ["A"], "explanation": ""}, {"id": 6, "source": "Marketing 162", "text": "Role při nákupním rozhodování na B2C trhu jsou:", "options": {"A": "Iniciátor, Kupující, Rozhodující, Ovlivňovatel, Uživatel", "B": "Iniciátor, Kupující, Rozhodující, Ovlivňovatel, Taktik", "C": "Iniciátor, Stratég, Rozhodující, Ovlivňovatel, Uživatel", "D": "Pouze rozhodující a kupující"}, "correct": ["A"], "explanation": ""}, {"id": 7, "source": "Marketing 162", "text": "Do psychografických kritérií segmentace nezařazujeme:", "options": {"A": "Životní styl", "B": "Příslušnost k určité sociální třídě", "C": "Bydliště, věk", "D": "Profesi"}, "correct": ["C"], "explanation": ""}, {"id": 8, "source": "Marketing 162", "text": "Situaci, kdy firma vyrábí 2 či více produktů, které se mohou lišit např. kvalitou, velikostí či jinými rysy, ale jsou nabízeny jedním propagačním mixem, označujeme jako:", "options": {"A": "Hromadný marketing", "B": "Tržně diferencovaný marketing", "C": "Koncentrovaný marketing", "D": "Výrobkově diferencovaný marketing"}, "correct": ["D"], "explanation": ""}, {"id": 9, "source": "Marketing 162", "text": "Získané dispozice člověka reagovat pozitivně či negativně vůči vybranému objektu označujeme jako:", "options": {"A": "Kultura", "B": "Hodnoty", "C": "Postoje", "D": "Učení"}, "correct": ["C"], "explanation": ""}, {"id": 10, "source": "Marketing 162", "text": "Určitou tendenci lidí přizpůsobovat získané informace svým představám nazýváme:", "options": {"A": "Osobní inklinace", "B": "Selektivní pozornost", "C": "Selektivní přepracování", "D": "Selektivní percepce"}, "correct": ["C"], "explanation": ""}, {"id": 11, "source": "Marketing 162", "text": "POS/POP materiály znamenají", "options": {"A": "Prodlouženou záruku", "B": "Reklamu v místě prodeje", "C": "Nadlinkové aktivity komunikace", "D": "Poprodejní servis vrámci rozšířeného produktu"}, "correct": ["B"], "explanation": ""}, {"id": 12, "source": "Marketing 162", "text": "Tzv. buzz marketing znamená:", "options": {"A": "Marketing zaměřený na šíření virálních kampaní", "B": "Šíření referencí tzv. šeptandou", "C": "Nový trend marketingu založený na šíření informací přes QR kódy", "D": "Ani jedna odpověď není správná"}, "correct": ["B"], "explanation": ""}, {"id": 13, "source": "Marketing 162", "text": "Porterův model pěti sil patří do:", "options": {"A": "Analýz zákazníka", "B": "Analýz konkurence", "C": "Obdoba SWOT analýzy", "D": "Portfolio analýz"}, "correct": ["B"], "explanation": ""}, { ": ""}, {"id": 89, "source": "Marketing 162", "text": "Proces vývoje nového produktu obsahuje tyto etapy:", "options": {"A": "technická příprava – projekční příprava – tvorba prototypu – ekonomická analýza – zavedení na trh", "B": "Průzkum – posouzení námětů – vytvoření a ověření koncepce – ekonomická analýza – vývoj – test nového produktu – komercializace", "C": "Průzkum – životní cyklus výrobku – analýza portfolia – zavedení na trh"}, "correct": ["B"], "explanation": ""}, {"id": 90, "source": "Marketing 162", "text": "Strategie zavádění nových výrobků na trh vycházejí ze vztahu mezi:", "options": {"A": "Náklady na propagaci a cenou výrobku", "B": "Ročním tempem růstu a podílu na trhu", "C": "Počtem výrobců a diferencovanými (nediferencovanými) produkty"}, "correct": ["B"], "explanation": ""}, {"id": 91, "source": "Marketing 162", "text": "Životní cyklus výrobku je dán vztahem mezi:", "options": {"A": "Ročním tempem růstu tržeb a podílem na trhu", "B": "Růstem tržeb a časem", "C": "Náklady na propagaci a cenou produktu"}, "correct": ["B"], "explanation": ""}, {"id": 92, "source": "Marketing 162", "text": "Ve fázi zralosti životního cyklu výrobku mohou firmy využívat těchto strategií:", "options": {"A": "Strategie modifikace produktu, strategie modifikace trhu, aktivní využívání mtg. mixu", "B": "SWOT analýzy, analýzy portfolia, strategii investičních nákladů", "C": "Strategii hromadné výroby, nízkých nákladů a střídmé propagace"}, "correct": ["A"], "explanation": ""}, {"id": 93, "source": "Marketing 162", "text": "S neelastickou poptávkou se setkáváme zejména u zboží:", "options": {"A": "Každodenní potřeby", "B": "Které je snadno nahraditelné a kupuje se často", "C": "Které je obtížně nahraditelné, kupuje se jen občas a u luxusního a prestižního zboží"}, "correct": ["A"], "explanation": ""}, {"id": 94, "source": "Marketing 162", "text": "Definice marketingu", "options": {"A": "Marketing je reklama zaměřená vždy na ekonomický zisk", "B": "Marketing je aktivita, kter planation": ""}, {"id": 196, "source": "Primát 111", "text": "Pro matici Bostonského modelu BCG platí, že", "options": {"A": "je součástí výzkumu trhu", "B": "obsahuje tzv. \"otazníky\", \"kočky\", \"krávy\" a \"hvězdy\"", "C": "pracuje s pojmy strategická podnikatelská jednotka", "D": "má na osách atraktivitu trhu a tempo růstu trhu"}, "correct": ["C"], "explanation": ""}, {"id": 197, "source": "Primát 111", "text": "Model AIDA řeší", "options": {"A": "metody cenové tvorby", "B": "cíle marketingové komunikace", "C": "úroveň prodejních cest", "D": "patří mezi situační analýzy"}, "correct": ["B"], "explanation": ""}, {"id": 198, "source": "Primát 111", "text": "Výstupem SWOT analýzy je", "options": {"A": "porovnání s konkurencí a řešení příčin tohoto stavu", "B": "stanovení dalších marketingových strategických kroků podniku", "C": "přehled o příležitostech pro podnik", "D": "analýza prodejů a tržního podílu"}, "correct": ["B"], "explanation": ""}, {"id": 199, "source": "Primát 111", "text": "Typickým příkladem extenzivního nákupního chování na B2C trhu je:", "options": {"A": "nákup nového rodinného domu", "B": "nákup nového trička", "C": "koupě svačiny", "D": "nákup mléka pro výrobu sýrů"}, "correct": ["A"], "explanation": ""}, {"id": 200, "source": "Primát 111", "text": "Přehled skladových zásob vybrané firmy patří pro vybranou firmu mezi", "options": {"A": "primární interní zdroj informaci", "B": "primární interní zdroj informaci", "C": "sekundární interní zdroj informací", "D": "sekundární externí zdroj informací"}, "correct": ["C"], "explanation": ""}, {"id": 201, "source": "Primát 111", "text": "Součástí analýzy mezoprostředí není:", "options": {"A": "analýza mínění veřejnosti", "B": "analýza konkurenčních aktivit", "C": "analýza parity kupní síly", "D": "analýza potenciálních dodavatelů"}, "correct": ["C"], "explanation": ""}, {"id": 202, "source": "Primát 111", "text": "Fází cíleného marketingu není", "options": {"A": "tržní umístění", "B": "reengineering", "C  222, "source": "Primát 111", "text": "Prodejní cesty na spotřebitelském trhu", "options": {"A": "mohou jít pouze přes velkoobchod a maloobchod, vždy však musí mít k dispozici prodejní prostory", "B": "prodej zboží bez prodejních prostor nelze realizovat ani výrobcem, ani velkoobchodem či maloobchodem", "C": "nemusí jít přes velkoobchod a maloobchod, dokonce v některých případech nemusí být k dispozici ani prodejní prostory", "D": "mohou mít až 9 různých typů úrovní"}, "correct": ["C"], "explanation": ""}, {"id": 223, "source": "Primát 111", "text": "Předmětem propagace v Public Relations je", "options": {"A": "image celé firmy", "B": "image všech produktů firmy", "C": "image konkrétního produktu", "D": "vlastnosti produktu"}, "correct": ["A"], "explanation": ""}, {"id": 224, "source": "Primát 111", "text": "Nevýhodou otevřených otázek je", "options": {"A": "omezený přísun informaci nemožnost", "B": "vyhodnocení dotazníků ve velkých souborech", "C": "možnost odpovídat nepravdivé", "D": "odpovědi se nemusejí kódovat"}, "correct": ["B"], "explanation": ""}, {"id": 225, "source": "Primát 111", "text": "Reklama používá převážně", "options": {"A": "komunikaci nepřímou", "B": "komunikaci přímou", "C": "komunikaci dvoustupňovou", "D": "digitální komunikaci"}, "correct": ["A"], "explanation": ""}, {"id": 226, "source": "Primát 111", "text": "Strategie posílení trhu\" představuje", "options": {"A": "zavádění nového produktu na nové trhy", "B": "zavádění stávajícího produktu na stávající trhy", "C": "zavedeni věrnostního programu", "D": "zavádění stávajícího produktu na nové trhy"}, "correct": ["B"], "explanation": ""}, {"id": 227, "source": "Primát 111", "text": "Při zavádění výrobku nu spotřebitelském trhu budou z komunikačního mixu nejdůležitější", "options": {"A": "reklama a publicita", "B": "reklama a osobní prodej", "C": "reklama a podpora prodeje", "D": "PR a osobní prodej"}, "correct": ["A"], "explanation": ""}, {"id": 228, "source": "Primát 111", "text": "Produkty ná // State
let settings = { source: 'all', batch: 25, order: 'sequential' };
let quiz = { questions: [], currentIdx: 0, wrongIds: new Set(), sessionWrong: [], answered: false, selectedOptions: new Set() };
let wrongAnswers = JSON.parse(localStorage.getItem('wrongAnswers') || '{}'); // {id: {text, yourAnswer, correct}}
let browseFilter = 'all';
let currentRange = 0;
let ranges = [];

function selectOpt(group, btn) {
  document.querySelectorAll(`#${group}-group .btn-opt`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  settings[group] = btn.dataset.value;
  updateRanges();
}

function getFilteredPool() {
  let pool = QUESTIONS;
  if (settings.source === 'm162') pool = QUESTIONS.filter(q => q.source === 'Marketing 162');
  else if (settings.source === 'p111') pool = QUESTIONS.filter(q => q.source === 'Primát 111');
  else if (settings.source === 'wrong') pool = QUESTIONS.filter(q => wrongAnswers[q.id]);
  return pool;
}

function updateRanges() {
  let pool = getFilteredPool();
  let batchSize = settings.batch === 'all' ? pool.length : parseInt(settings.batch);
  ranges = [];
  for (let i = 0; i < pool.length; i += batchSize) {
    ranges.push({ start: i, end: Math.min(i + batchSize, pool.length), label: `${i+1}–${Math.min(i+batchSize, pool.length)}` });
  }
  const container = document.getElementById('range-buttons');
  const info = document.getElementById('range-info');
  info.textContent = `(${pool.length} otázek, dávky po ${batchSize === pool.length ? 'všech' : batchSize})`;
  
  if (settings.batch === 'all') {
    container.innerHTML = '<span style="color:#888;font-size:13px">Všechny otázky najednou – výběr rozsahu není dostupný</span>';
    currentRange = 0;
    document.getElementById('range-card').style.display = 'none';
    return;
  }
  document.getElementById('range-card').style.display = 'block';
  container.innerHTML = '';
  ranges.forEach((r, idx) => {
    const btn = document.createElement('button');
    btn.className = 'btn-opt' + (idx === currentRange ? ' selected' : '');
    btn.textContent = r.label;
    btn.onclick = () => {
      document.querySelectorAll('#range-buttons .btn-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      currentRange = idx;
    };
    container.appendChild(btn);
  });
}

// order buttons handled via selectOpt

function startQuiz() {
  let pool = getFilteredPool();
  if (pool.length === 0) { alert('Žádné otázky v tomto výběru!'); return; }
  
  let selected;
  if (settings.batch === 'all') {
    selected = settings.order === 'random' ? [...pool].sort(() => Math.random() - 0.5) : pool;
  } else {
    let r = ranges[currentRange] || ranges[0];
    selected = pool.slice(r.start, r.end);
    if (settings.order === 'random') selected = [...selected].sort(() => Math.random() - 0.5);
  }
  
  quiz.questions = selected;
  quiz.currentIdx = 0;
  quiz.wrongIds = new Set();
  quiz.sessionWrong = [];
  quiz.answered = false;
  quiz.queue = [...selected]; // queue to repeat wrong ones
  
  showPage('quiz');
  document.getElementById('nav-quiz').style.display = '';
  renderQuestion();
}

function renderQuestion() {
  if (quiz.queue.length === 0) { showResults(); return; }
  
  const q = quiz.queue[0];
  quiz.answered = false;
  quiz.selectedOptions = new Set();
  const isMulti = q.correct.length > 1;
  
  document.getElementById('quiz-question').textContent = q.text;
  const srcBadge = document.getElementById('quiz-source-badge');
  srcBadge.innerHTML = `<span class="source-label ${q.source === 'Marketing 162' ? 'src-m162' : 'src-p111'}">${q.source}</span>`;
  
  document.getElementById('multi-hint').style.display = isMulti ? 'block' : 'none';
  document.getElementById('btn-confirm').style.display = isMulti ? 'inline-block' : 'none';
  document.getElementById('btn-next').style.display = 'none';
  
  const optContainer = document.getElementById('quiz-options');
  optContainer.innerHTML = '';
  
  const letters = Object.keys(q.options).sort();
  letters.forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="letter">${letter}</span><span>${q.options[letter]}</span>`;
    btn.onclick = () => handleAnswer(letter, btn, q, isMulti);
    optContainer.appendChild(btn);
  });
  
  document.getElementById('quiz-feedback').style.display = 'none';
  document.getElementById('quiz-explanation').style.display = 'none';
  
  updateProgress();
}

function handleAnswer(letter, btn, q, isMulti) {
  if (quiz.answered && !isMulti) return;
  
  if (isMulti) {
    if (quiz.answered) return;
    if (quiz.selectedOptions.has(letter)) {
      quiz.selectedOptions.delete(letter);
      btn.style.background = '';
      btn.style.borderColor = '';
    } else {
      quiz.selectedOptions.add(letter);
      btn.style.background = '#e8f0fe';
      btn.style.borderColor = '#1a73e8';
    }
    return;
  }
  
  // Single answer
  quiz.answered = true;
  const isCorrect = q.correct.includes(letter);
  
  // Disable all buttons
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  
  // Mark correct answers green
  q.correct.forEach(cl => {
    document.querySelectorAll('.option-btn').forEach(b => {
      if (b.querySelector('.letter').textContent === cl) b.classList.add('correct');
    });
  });
  
  if (!isCorrect) {
    btn.classList.add('wrong');
    markWrong(q, letter);
    showFeedback(false, `Správná odpověď: ${q.correct.join(', ')}) ${q.correct.map(c => q.options[c]).join(' / ')}`, q.explanation);
  } else {
    // If was in wrong list from this session, still keep wrong count but show success
    showFeedback(true, '✓ Správně!', q.explanation);
    // Remove from queue's repeat if needed
    quiz.queue.shift();
    document.getElementById('btn-next').style.display = 'inline-block';
    updateProgress();
    return;
  }
  
  // Wrong: move to end of queue for repeat
  quiz.queue.shift();
  quiz.queue.push(q);
  document.getElementById('btn-next').style.display = 'inline-block';
  updateProgress();
}

function confirmMulti() {
  const q = quiz.queue[0];
  if (quiz.selectedOptions.size === 0) { alert('Vyber alespoň jednu odpověď!'); return; }
  quiz.answered = true;
  
  const selectedArr = Array.from(quiz.selectedOptions).sort();
  const correctArr = [...q.correct].sort();
  const isCorrect = JSON.stringify(selectedArr) === JSON.stringify(correctArr);
  
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  
  // Mark correct
  q.correct.forEach(cl => {
    document.querySelectorAll('.option-btn').forEach(b => {
      if (b.querySelector('.letter').textContent === cl) b.classList.add('correct');
    });
  });
  
  // Mark wrong selections
  quiz.selectedOptions.forEach(sl => {
    if (!q.correct.includes(sl)) {
      document.querySelectorAll('.option-btn').forEach(b => {
        if (b.querySelector('.letter').textContent === sl) b.classList.add('wrong');
      });
    }
  });
  
  document.getElementById('btn-confirm').style.display = 'none';
  document.getElementById('btn-next').style.display = 'inline-block';
  
  if (isCorrect) {
    showFeedback(true, '✓ Správně!', q.explanation);
    quiz.queue.shift();
  } else {
    markWrong(q, selectedArr.join(','));
    showFeedback(false, `Správná odpověď: ${q.correct.join(' + ')}`, q.explanation);
    quiz.queue.shift();
    quiz.queue.push(q);
  }
  updateProgress();
}

function markWrong(q, yourAnswer) {
  quiz.wrongIds.add(q.id);
  if (!wrongAnswers[q.id]) {
    wrongAnswers[q.id] = { text: q.text, yourAnswer: yourAnswer, correct: q.correct.join(','), source: q.source, options: q.options };
    localStorage.setItem('wrongAnswers', JSON.stringify(wrongAnswers));
  }
  updateWrongCounter();
}

function updateWrongCounter() {
  const n = quiz.wrongIds.size;
  document.getElementById('wrong-counter').textContent = `❌ ${n} k opakování`;
  document.getElementById('wrong-count-h').textContent = Object.keys(wrongAnswers).length;
  if (Object.keys(wrongAnswers).length > 0) document.getElementById('wrong-counter-header').style.display = '';
}

function showFeedback(correct, msg, explanation) {
  const fb = document.getElementById('quiz-feedback');
  fb.className = 'feedback ' + (correct ? 'correct-fb' : 'wrong-fb');
  fb.textContent = msg;
  fb.style.display = 'block';
  if (explanation) {
    const ex = document.getElementById('quiz-explanation');
    ex.textContent = explanation;
    ex.style.display = 'block';
  }
}

function nextQuestion() {
  document.getElementById('btn-next').style.display = 'none';
  renderQuestion();
}

function updateProgress() {
  const total = quiz.questions.length;
  const done = total - new Set(quiz.queue.map(q => q.id)).size + (quiz.queue.length > 0 ? 0 : 0);
  // Progress: how many unique questions answered correctly
  const uniqueInQueue = new Set(quiz.queue.map(q => q.id)).size;
  const correctDone = total - uniqueInQueue;
  const pct = total > 0 ? Math.round((correctDone / total) * 100) : 100;
  document.getElementById('quiz-progress-fill').style.width = pct + '%';
  document.getElementById('quiz-qnum').textContent = `Správně ${correctDone} / ${total} | Fronta: ${quiz.queue.length}`;
}

function endQuiz() {
  showResults();
}

function showResults() {
  showPage('results');
  const total = quiz.questions.length;
  const wrong = quiz.wrongIds.size;
  const correct = total - wrong;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  document.getElementById('res-score').textContent = pct + '%';
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-total').textContent = total;
  document.getElementById('retry-wrong-btn').style.display = wrong > 0 ? '' : 'none';
}

function retryWrong() {
  settings.source = 'wrong';
  startQuiz();
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const navBtns = { setup: 0, quiz: 1, browse: 2, wrong: 3, results: -1 };
  const idx = navBtns[name];
  if (idx >= 0) document.querySelectorAll('nav button')[idx].classList.add('active');
  if (name === 'browse') renderBrowse();
  if (name === 'wrong') renderWrong();
}

// BROWSE
let browseAll = [...QUESTIONS];
function filterBrowse() {
  const query = document.getElementById('search-input').value.toLowerCase();
  let filtered = QUESTIONS;
  if (browseFilter === 'm162') filtered = filtered.filter(q => q.source === 'Marketing 162');
  else if (browseFilter === 'p111') filtered = filtered.filter(q => q.source === 'Primát 111');
  if (query.length > 1) {
    filtered = filtered.filter(q => 
      q.text.toLowerCase().includes(query) || 
      Object.values(q.options).some(v => v.toLowerCase().includes(query))
    );
  }
  renderBrowseList(filtered);
}

function selectBrowseFilter(btn, val) {
  document.querySelectorAll('.filter-row .btn-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  browseFilter = val;
  filterBrowse();
}

function renderBrowse() { filterBrowse(); }
function renderBrowseList(list) {
  const container = document.getElementById('browse-list');
  document.getElementById('browse-count').textContent = `Zobrazeno: ${list.length} otázek`;
  container.innerHTML = '';
  list.forEach(q => {
    const div = document.createElement('div');
    div.className = 'browse-item';
    const isWrong = wrongAnswers[q.id] ? '❌ ' : '';
    div.innerHTML = `
      <div class="q-num">#${q.id} · <span class="source-label ${q.source === 'Marketing 162' ? 'src-m162' : 'src-p111'}">${q.source}</span> ${isWrong}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-correct">✓ ${q.correct.map(c => c + ') ' + q.options[c]).join(' | ')}</div>
    `;
    container.appendChild(div);
  });
}

// WRONG ANSWERS
function renderWrong() {
  const container = document.getElementById('wrong-list');
  const entries = Object.entries(wrongAnswers);
  if (entries.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">✅</div><div>Žádné špatné odpovědi!</div></div>';
    return;
  }
  container.innerHTML = `<p style="color:#888;font-size:13px;margin-bottom:16px">Celkem ${entries.length} špatně zodpovězených otázek (ze všech kvízů)</p>`;
  entries.forEach(([id, data]) => {
    const div = document.createElement('div');
    div.className = 'wrong-item';
    div.innerHTML = `
      <div class="q-num" style="font-size:11px;color:#aaa;margin-bottom:4px">#${id} · ${data.source}</div>
      <div class="wq-text">${data.text}</div>
      <div class="wq-correct" style="margin-top:6px">✓ Správně: ${data.correct.split(',').map(c => c + ') ' + (data.options[c]||'')).join(' | ')}</div>
    `;
    container.appendChild(div);
  });
}

function clearWrong() {
  if (!confirm('Opravdu vymazat všechny špatné odpovědi?')) return;
  wrongAnswers = {};
  localStorage.setItem('wrongAnswers', JSON.stringify(wrongAnswers));
  document.getElementById('wrong-counter-header').style.display = 'none';
  renderWrong();
}

// Init
updateRanges();
updateWrongCounter();
</script>
